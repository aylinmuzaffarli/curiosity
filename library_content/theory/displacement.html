<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Displacement — Curiosity</title>
  <link rel="icon" type="image/png" href="../../logoCu.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Lora:ital,wght@0,400;1,400&family=Syne:wght@800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#F8F5F0;
      --text:#111;
      --muted:#888;
      --soft:#5f5a55;
      --copper:#C17B3F;
      --card-bg:#ffffff;
      --card-border:rgba(0,0,0,0.07);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--bg);
      font-family:'Inter',sans-serif;
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:-15%;
      background:
        radial-gradient(circle at 18% 22%, rgba(193,123,63,0.10), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(255,255,255,0.7), transparent 28%),
        radial-gradient(circle at 72% 78%, rgba(0,0,0,0.04), transparent 34%);
      animation:breathBg 12s ease-in-out infinite;
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(to bottom, rgba(248,245,240,0.55), rgba(248,245,240,0.9)),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.06) 0,
          rgba(255,255,255,0.06) 1px,
          transparent 1px,
          transparent 120px
        );
      z-index:-1;
      pointer-events:none;
    }

    @keyframes breathBg{
      0%,100%{transform:scale(1);opacity:.85;}
      50%{transform:scale(1.04);opacity:1;}
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(14px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* ===== NAVBAR ===== */
    .navbar{
      position:fixed;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      width:calc(100% - 80px);
      max-width:1100px;
      padding:14px 20px;
      border-radius:18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(255,255,255,0.35);
      border:0.5px solid rgba(255,255,255,0.65);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.07),
        inset 0 1px 0 rgba(255,255,255,0.85);
      backdrop-filter:blur(14px) saturate(160%);
      -webkit-backdrop-filter:blur(14px) saturate(160%);
      z-index:9999;
      isolation:isolate;
      will-change:transform;
    }

    .logo{
      font-family:'Syne';
      font-size:17px;
      text-decoration:none;
      color:var(--text);
    }

    .logo span{
      color:var(--copper);
    }

    .nav-links{
      display:flex;
      gap:22px;
      align-items:center;
    }

    .nav-links a{
      text-decoration:none;
      font-size:13px;
      color:var(--muted);
      transition:.2s;
    }

    .nav-links a.active{
      color:var(--copper);
      font-weight:500;
    }

    .nav-links a:hover{
      color:var(--copper);
    }

    .back-link{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:13px;
      color:var(--muted);
      text-decoration:none;
      transition:.2s;
      border-left:0.5px solid rgba(0,0,0,0.1);
      padding-left:22px;
      margin-left:4px;
    }

    .back-link:hover{
      color:var(--copper);
    }

    .back-link svg{
      stroke:currentColor;
      transition:.2s;
    }

    /* ===== PAGE ===== */
    .article-wrap{
      max-width:860px;
      margin:0 auto;
      padding:140px 60px 100px;
    }

    .article-eyebrow{
      color:var(--copper);
      font-size:11px;
      letter-spacing:2.8px;
      text-transform:uppercase;
      margin-bottom:14px;
      opacity:0;
      animation:fadeUp .5s ease forwards .05s;
    }

    .article-title{
      font-family:'Lora';
      font-size:26px;
      line-height:1.6;
      color:var(--text);
      margin-bottom:16px;
      opacity:0;
      animation:fadeUp .6s ease forwards .15s;
    }

    .article-divider{
      width:36px;
      height:1px;
      background:var(--copper);
      margin-bottom:36px;
      opacity:0;
      animation:fadeUp .5s ease forwards .3s;
    }

    .article-body{
      opacity:0;
      animation:fadeUp .6s ease forwards .4s;
    }

    .article-img-wrap{
      margin:28px 0 18px;
      border-radius:14px;
      overflow:hidden;
      border:0.5px solid var(--card-border);
      background:#fff;
      box-shadow:0 10px 28px rgba(0,0,0,0.06);
    }

    .article-img-wrap img{
      width:100%;
      display:block;
    }

    .download-wrap{
      display:flex;
      justify-content:flex-start;
      margin-top:10px;
    }

    .download-btn{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:13px 18px;
      border-radius:999px;
      background:var(--copper);
      color:#fff;
      text-decoration:none;
      font-size:13px;
      font-weight:500;
      letter-spacing:0.2px;
      box-shadow:0 10px 24px rgba(193,123,63,0.22);
      transition:.22s;
      -webkit-tap-highlight-color:transparent;
    }

    .download-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 28px rgba(193,123,63,0.26);
    }

    .download-btn svg{
      stroke:currentColor;
    }

    /* ===== TABLET ===== */
    @media(max-width:900px){
      .navbar{
        width:calc(100% - 40px);
      }

      .article-wrap{
        max-width:100%;
        padding:130px 32px 80px;
      }
    }

    /* ===== MOBILE ===== */
    @media(max-width:768px){
      .navbar{
        width:calc(100% - 30px);
        top:12px;
        padding:12px 14px;
      }

      .nav-links{
        gap:12px;
      }

      .back-link{
        padding-left:12px;
      }

      .article-wrap{
        padding:110px 18px 60px;
      }

      .article-title{
        font-size:19px;
      }
    }

    /* ===== SMALL MOBILE ===== */
    @media(max-width:380px){
      .article-title{
        font-size:17px;
      }

      .nav-links a:not(.back-link){
        display:none;
      }

      .download-btn{
        width:100%;
        justify-content:center;
      }
    }
  </style>
</head>

<body>
  <div class="navbar">
    <a href="../../index.html" class="logo"><span>Cu</span>riosity</a>

    <div class="nav-links">
      <a href="../../index.html">Home</a>
      <a href="../../explore.html">Explore</a>
      <a href="../../library.html" class="active">Library</a>
      <a href="../../contact.html">Contact</a>

      <a href="../../library.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 7H3M6 3L2 7l4 4"/>
        </svg>
        Library
      </a>
    </div>
  </div>

  <div class="article-wrap">
    <div class="article-eyebrow">Theory</div>
    <div class="article-title">Displacement</div>
    <div class="article-divider"></div>

    <div class="article-body">
      <div class="article-img-wrap">
        <img src="../imgs/theory_images/Displacement.jpg" alt="Displacement cover">
      </div>

      <div class="download-wrap">
        <a class="download-btn" href="../pdfs/displacement.pdf" target="_blank" rel="noopener">
  Open PDF
</a>
      </div>
    </div>
  </div>
</body>
</html>
